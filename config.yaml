# ============================================================
# Pipeline Configuration — edit paths here, code stays generic
# ============================================================

# --- Paths ---
data_root: "dataset-test"  # full dataset (good_weld + defect-weld)
output_root: "output"       # all generated artefacts go here

# --- Label mapping (code → human name) ---
# The run-ID suffix encodes the label.  Full dataset uses 00-11.
label_map:
  "00": "good_weld"
  "01": "excessive_penetration"
  "02": "burn_through"
  "06": "overlap"
  "07": "lack_of_fusion"
  "08": "excessive_convexity"
  "11": "crater_cracks"

# --- Sensor (CSV) settings ---
sensor:
  numeric_columns:
    - "Pressure"
    - "CO2 Weld Flow"
    - "Feed"
    - "Primary Weld Current"
    - "Wire Consumed"
    - "Secondary Weld Voltage"
  # Welding-active detection: Current must exceed this threshold (Amps)
  weld_active_current_threshold: 5.0
  # Target uniform sample rate (Hz) when resampling for alignment
  target_sample_rate: 31.0   # match actual video fps

# --- Audio settings ---
audio:
  target_sr: 16000        # native SR of the FLAC files
  n_mels: 128             # mel-spectrogram bands
  n_mfcc: 13              # MFCC coefficients
  hop_length: 512          # spectrogram hop (samples)
  n_fft: 2048              # FFT window size

# --- Video settings ---
video:
  target_fps: 1.0          # 1 fps for EDA thumbnails (step4 only; step6 reads AVI directly)
  resize_width: 480        # resize frames to this width
  resize_height: 300       # resize frames to this height

# --- Splits ---
splits:
  seed: 42
  val_ratio: 0.15
  test_ratio: 0.15         # only used if no external test set

# ============================================================
#  PHASE 2 & 3 — Training & Inference
# ============================================================

# --- Tier 1: Tabular baseline (LightGBM) ---
tabular:
  enabled: true
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 6
  num_leaves: 31
  seed: 42

# --- Tier 2: WeldFusionNet (neural, multimodal) ---
modalities:
  # Neural training/evaluation modalities.
  # Set use_sensor: false to train/evaluate with audio(+video) only.
  # CSV ingestion remains available for other steps/experiments.
  use_sensor: false

training:
  seed: 42
  batch_size: 16                     # lowered from 32 — video branch with
                                     # 5×224×224 frames per sample needs headroom
  max_epochs: 20
  patience: 5
  lr: 0.001
  weight_decay: 0.0001
  gradient_clip: 1.0
  # Loss
  focal_gamma: 1.0            # lowered from 2.0 — reduce aggressive hard-example upweighting
  mtl_alpha: 0.7           # weight for multi-class focal loss
  mtl_beta: 0.3            # weight for binary BCE loss
  # Video
  video_backbone: "mobilenet_v3_small"   # or "tiny" for CPU-only
  video_frames: 5           # subsample from 25 per chunk
  # Paths
  checkpoint_dir: "output/checkpoints"

# --- Tier 3: Upgrades (transformer fusion / ensemble) ---
tier3:
  transformer_fusion: false   # swap concat+MLP → transformer head
  transformer_layers: 2
  transformer_heads: 4
  ensemble_with_tabular: false

# --- Calibration ---
calibration:
  method: "temperature"      # "temperature" or "platt"
  n_bins: 15

# --- Inference ---
inference:
  test_data_root: "test_data"
  aggregation_method: "mean"       # mean, max_confidence, majority_vote
  binary_threshold: 0.5            # tuned on val set
  submission_path: "output/submission.csv"
