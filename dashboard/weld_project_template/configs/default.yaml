project:
  name: weld-hackathon
paths:
  raw_train_good: data/raw/train/good_weld
  raw_train_defect: data/raw/train/defect_weld
  raw_test: data/raw/test
  index: data/interim/index/run_index.jsonl
  inventory: data/interim/index/inventory.csv
  # When using manifest-based indexing (from preprocessed pipeline):
  manifest: data/interim/manifest.csv
  split_dict: data/interim/split_dict.json
  dataset_meta: data/interim/dataset_meta.json
  norm_stats: data/interim/norm_stats.json
  # If raw data moved: set to parent of good_weld/defect_data_weld (replaces /Volumes/... in manifest paths)
  data_root: null
  features: data/processed/features/features.parquet
  chunks: data/processed/chunks/chunks.parquet
processing:
  active_window:
    current_threshold_a: 5.0
    pad_seconds: 0.75
  resample_hz: 25
audio:
  sr: null
  n_mels: 128
  n_fft: 2048
  hop_length: 512
video:
  sample_fps: 2
  frame_size: 224
dashboard:
  cache_dir: outputs/reports/dashboards/cache
  points_3d: outputs/reports/dashboards/points_3d.json
  # Pipeline output paths (steps 7, 11, 12, 13, 14)
  tabular: outputs/tabular
  checkpoints: outputs/checkpoints
  eval: outputs/eval
  predictions: outputs/predictions
  reports: outputs/reports
  dataset: data/interim
  # Live Sync: path(s) to run folders. Use dropdown in Live Sync to choose between available runs.
  sample_data: assets/sample_data
  sensor_stats: data/interim/sensor_stats.csv
  # Top-15 Insights panel data sources
  top15_csv: data/processed/dashboard_top15_features.csv
  top15_summary: data/processed/dashboard_feature_summary.json
  feature_importance: outputs/tabular/feature_importance.csv
  audit_bias: outputs/audit_metadata_bias_report.json
  audit_duplicates: outputs/audit_duplicates_report.json
  class_weights: outputs/tabular/class_weights.json
  alignment_summary: D:/hachaton/multimodal-weld-defect-detection/output/alignment_summary.csv
  eval_val_predictions: outputs/eval/val_predictions.csv
  eval_val_metrics: outputs/eval/val_metrics.json
  eval_per_class: outputs/eval/per_class_report.csv
  tabular_val_metrics: outputs/tabular/val_metrics.json
  inference_predictions: outputs/predictions/predictions.csv
  # Live inference model artefacts
  checkpoint: D:/hachaton/multimodal-weld-defect-detection/output/checkpoints/best_model.pt
  norm_stats_inf: D:/hachaton/multimodal-weld-defect-detection/output/dataset/norm_stats.json
  pipeline_config: D:/hachaton/multimodal-weld-defect-detection/config.yaml
